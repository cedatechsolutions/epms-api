spring.application.name=api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.config.import=optional:file:.env[.properties]

server.port=${PORT:8080}
server.address=0.0.0.0

app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.sync-bootstrap-users=${APP_SEED_SYNC_BOOTSTRAP_USERS:true}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.recaptcha.enabled=${APP_RECAPTCHA_ENABLED:false}
app.recaptcha.site-secret=${APP_RECAPTCHA_SITE_SECRET:}
app.recaptcha.verify-url=${APP_RECAPTCHA_VERIFY_URL:https://www.google.com/recaptcha/api/siteverify}

jwt.secret=${JWT_SECRET:local-development-jwt-secret-change-before-shared-environments-64-bytes-minimum}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
